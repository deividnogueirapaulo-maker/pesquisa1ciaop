<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Acesso Rápido - 6º BBM - 1ª Cia Operacional</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #d32f2f;
            --bg-white: #ffffff;
            --text-dark: #333333;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
            --max-page-width: 1400px; 
            --max-aviso-width: 1000px;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-white);
            margin: 0;
            padding: 20px 40px;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            width: 100%;
            max-width: var(--max-page-width);
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .header-logo { grid-column: 1; justify-self: start; }
        .header-logo img { height: 110px; width: auto; display: block; }

        .header-text { grid-column: 2; text-align: center; }
        header h1, header .sub-header {
            font-weight: 700;
            color: var(--primary-red);
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 1px;
        }
        header h1 { font-size: 2.2rem; }
        header .sub-header { font-size: 1.6rem; margin-top: 5px; opacity: 0.9; }

        .header-spacer { grid-column: 3; }

        .info-bar {
            width: 100%;
            max-width: var(--max-page-width);
            text-align: left;
            font-size: 15pt;
            margin-bottom: 30px;
            border-left: 8px solid var(--primary-red);
            padding-left: 20px;
            color: #444;
            font-weight: bold;
        }

        .btn-base {
            background-color: #fff;
            border: 2.5px solid var(--primary-red);
            border-radius: 12px;
            text-decoration: none;
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: block;
            cursor: pointer;
            color: var(--primary-red);
        }

        .btn-base:hover {
            background-color: var(--primary-red);
            transform: translateY(-6px);
            box-shadow: 0 12px 24px rgba(211, 47, 47, 0.25);
            color: #fff !important;
        }

        #avisos-wrapper {
            width: 100%;
            max-width: var(--max-aviso-width);
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 35px;
        }

        .btn-aviso { padding: 15px 0; overflow: hidden; }

        .marquee {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee 10s linear infinite;
            font-weight: 700;
            font-size: 1.2rem;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .grid-links {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: var(--max-page-width);
        }

        .btn-link {
            padding: 30px 20px;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
        }

        @media (max-width: 768px) {
            body { padding: 15px; }
            header { display: flex; flex-direction: column; gap: 20px; }
            .header-logo img { height: 80px; }
            header h1 { font-size: 1.6rem; }
            .grid-links { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-logo" id="logo-container"></div>
        <div class="header-text">
            <h1>Central de Acesso Rápido</h1>
            <div class="sub-header">6º BBM - 1ª Cia Operacional</div>
        </div>
        <div class="header-spacer"></div>
    </header>

    <div class="info-bar" id="data-pelotao">Sincronizando...</div>
    <div id="avisos-wrapper"></div>
    <div class="grid-links" id="links-container"></div>

    <script>
        const SHEET_ID = '1qh_Xkuu0RIKmcnBxuXpuBKIOq91sUi_zpHCKsDD2jcA';

        function formatarLinkImagem(url) {
            if (url.includes('drive.google.com')) {
                const id = url.split('/d/')[1]?.split('/')[0] || url.split('id=')[1]?.split('&')[0];
                // Link direto estável para o Google Drive
                return `https://drive.google.com/uc?export=view&id=${id}`;
            }
            return url;
        }

        function atualizarEscala() {
            const agora = new Date();
            const dataReferencia = new Date(2026, 3, 27); 

            let dataOperacional = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate());

            if (agora.getHours() < 8) {
                dataOperacional.setDate(dataOperacional.getDate() - 1);
            }

            const diffTempo = dataOperacional.getTime() - dataReferencia.getTime();
            const diffDias = Math.round(diffTempo / (1000 * 60 * 60 * 24));

            let pelotao = (diffDias % 4) + 1;
            if (pelotao <= 0) pelotao += 4;

            const dataTexto = dataOperacional.toLocaleDateString('pt-BR', { 
                day: 'numeric',
                month: 'long', 
                year: 'numeric'
            });

            document.getElementById('data-pelotao').innerText = `${dataTexto} - ${pelotao}º Pelotão Operacional`;
        }

        async function fetchSheetData(tabName) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;
            const response = await fetch(url);
            const text = await response.text();
            return text.split('\n').map(row => row.split(',').map(cell => cell.replace(/"/g, '')));
        }

        async function carregarPagina() {
            try {
                const wrapper = document.getElementById('avisos-wrapper');
                const linksContainer = document.getElementById('links-container');
                const logoContainer = document.getElementById('logo-container');
                const agora = new Date();

                // Logo
                const logosData = await fetchSheetData('logos');
                if (logosData && logosData[1] && logosData[1][1]) {
                    const imgUrl = formatarLinkImagem(logosData[1][1].trim());
                    logoContainer.innerHTML = `<img src="${imgUrl}" alt="Logo" onerror="this.src='https://via.placeholder.com/150?text=CBMMG'">`;
                }

                // Avisos (Simbolo removido)
                const avisoData = await fetchSheetData('aviso');
                wrapper.innerHTML = '';
                if (avisoData) {
                    avisoData.slice(1).forEach(row => {
                        const msg = row[0];
                        const link = row[1];
                        const dataLimite = row[2];
                        const horaLimite = row[3];

                        if (msg && msg.trim() !== "") {
                            let exibir = true;
                            if (dataLimite && dataLimite.trim() !== "") {
                                try {
                                    const d = dataLimite.split('/');
                                    const h = (horaLimite && horaLimite.includes(':')) ? horaLimite.split(':') : [23, 59];
                                    const dataExpiracao = new Date(d[2], d[1] - 1, d[0], h[0], h[1]);
                                    if (agora > dataExpiracao) exibir = false;
                                } catch (e) { console.error("Erro data", e); }
                            }

                            if (exibir) {
                                const a = document.createElement('a');
                                a.href = link || "#";
                                a.target = "_blank";
                                a.className = "btn-base btn-aviso";
                                a.innerHTML = `<div class="marquee">AVISO: ${msg}</div>`;
                                wrapper.appendChild(a);
                            }
                        }
                    });
                }

                // Links
                const linksData = await fetchSheetData('links');
                linksContainer.innerHTML = '';
                if (linksData) {
                    linksData.slice(1).forEach(row => {
                        if(row[0] && row[1]) {
                            const a = document.createElement('a');
                            a.href = row[1];
                            a.className = "btn-base btn-link";
                            a.innerText = row[0];
                            a.target = "_blank";
                            linksContainer.appendChild(a);
                        }
                    });
                }
            } catch (e) { console.error("Falha", e); }
        }

        atualizarEscala();
        carregarPagina();
        setInterval(() => { atualizarEscala(); carregarPagina(); }, 300000);
    </script>
</body>
</html>
