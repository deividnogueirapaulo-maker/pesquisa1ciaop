<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Acesso Rápido - 6º BBM - 1ª Cia Operacional</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #d32f2f;
            --bg-white: #ffffff;
            --text-dark: #333333;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
            --max-page-width: 1400px; 
            --max-aviso-width: 1000px;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-white);
            margin: 0;
            padding: 20px 40px;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            width: 100%;
            max-width: var(--max-page-width);
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .header-logo { grid-column: 1; justify-self: start; }
        .header-logo img { height: 110px; width: auto; display: block; }

        .header-text { grid-column: 2; text-align: center; }
        header h1, header .sub-header {
            font-weight: 700;
            color: var(--primary-red);
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 1px;
        }
        header h1 { font-size: 2.2rem; }
        header .sub-header { font-size: 1.6rem; margin-top: 5px; opacity: 0.9; }

        .header-spacer { grid-column: 3; }

        .info-bar {
            width: 100%;
            max-width: var(--max-page-width);
            text-align: left;
            font-size: 15pt;
            margin-bottom: 30px;
            border-left: 8px solid var(--primary-red);
            padding-left: 20px;
            color: #444;
            font-weight: bold;
        }

        /* Grid de Links */
        .grid-links {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: var(--max-page-width);
        }

        .btn-base {
            background-color: #fff;
            border: 2.5px solid var(--primary-red);
            border-radius: 12px;
            text-decoration: none;
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: block;
            cursor: pointer;
            color: var(--primary-red);
            position: relative;
        }

        .btn-base:hover {
            background-color: var(--primary-red);
            transform: translateY(-6px);
            box-shadow: 0 12px 24px rgba(211, 47, 47, 0.25);
            color: #fff !important;
        }

        .btn-link {
            padding: 30px 20px;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
        }

        /* Preview Flutuante Otimizado para Documentos */
        .preview-container {
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            width: 320px; /* Um pouco mais largo para PDFs */
            height: 200px;
            background-color: #f9f9f9;
            border: 3px solid var(--primary-red);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            overflow: hidden;
            pointer-events: none;
        }

        .preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Garante que a capa do documento preencha o espaço */
            display: block;
        }

        .btn-base:hover .preview-container {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) scale(1);
        }

        /* Avisos */
        #avisos-wrapper {
            width: 100%;
            max-width: var(--max-aviso-width);
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 35px;
        }

        .btn-aviso { padding: 15px 0; overflow: hidden; }

        .marquee {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee 10s linear infinite;
            font-weight: 700;
            font-size: 1.2rem;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        @media (max-width: 768px) {
            .preview-container { display: none; }
            .grid-links { grid-template-columns: 1fr; }
            header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-logo" id="logo-container"></div>
        <div class="header-text">
            <h1>Central de Acesso Rápido</h1>
            <div class="sub-header">6º BBM - 1ª Cia Operacional</div>
        </div>
        <div class="header-spacer"></div>
    </header>

    <div class="info-bar" id="data-pelotao">Sincronizando escala...</div>
    <div id="avisos-wrapper"></div>
    <div class="grid-links" id="links-container"></div>

    <script>
        const SHEET_ID = '1qh_Xkuu0RIKmcnBxuXpuBKIOq91sUi_zpHCKsDD2jcA';

        // Lógica universal para extrair ID e gerar preview (Imagem, PDF, Docs, Sheets)
        function formatarLinkDrive(url, tipo = 'view') {
            if (!url || !url.includes('drive.google.com')) return url.trim();
            
            // Regex robusta para capturar o ID de qualquer tipo de arquivo do Google
            const match = url.match(/[-\w]{25,}/);
            const id = match ? match[0] : '';
            if (!id) return url.trim();
            
            // O endpoint /thumbnail funciona para PDFs e Google Workspace Files também!
            return tipo === 'thumb' 
                ? `https://drive.google.com/thumbnail?id=${id}&sz=w600` 
                : `https://drive.google.com/uc?export=view&id=${id}`;
        }

        function atualizarEscala() {
            const agora = new Date();
            const dataRef = new Date(2026, 3, 27); 
            let dataOp = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate());
            if (agora.getHours() < 8) dataOp.setDate(dataOp.getDate() - 1);
            const diff = Math.round((dataOp.getTime() - dataRef.getTime()) / (1000 * 60 * 60 * 24));
            let pel = (diff % 4) + 1;
            if (pel <= 0) pel += 4;
            const txt = dataOp.toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('data-pelotao').innerText = `${txt} - ${pel}º Pelotão Operacional`;
        }

        async function fetchSheetData(tabName) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;
            const response = await fetch(url);
            const text = await response.text();
            return text.split('\n').map(row => row.split(',').map(cell => cell.replace(/"/g, '')));
        }

        async function carregarPagina() {
            try {
                const wrapper = document.getElementById('avisos-wrapper');
                const linksContainer = document.getElementById('links-container');
                const logoContainer = document.getElementById('logo-container');
                const agora = new Date();

                // 1. Logo
                const logosData = await fetchSheetData('logos');
                if (logosData && logosData[1]) {
                    const logoUrl = formatarLinkDrive(logosData[1][1].trim(), 'view');
                    logoContainer.innerHTML = `<img src="${logoUrl}" alt="Logo" onerror="this.src='https://via.placeholder.com/110?text=6BBM'">`;
                }

                // 2. Avisos com Preview (Coluna E)
                const avisoData = await fetchSheetData('aviso');
                wrapper.innerHTML = '';
                avisoData.slice(1).forEach(row => {
                    const [msg, link, dataLim, horaLim, imgPrev] = row;
                    if (msg && msg.trim() !== "") {
                        let exibir = true;
                        if (dataLim && dataLim.trim() !== "") {
                            const d = dataLim.split('/');
                            const h = (horaLim && horaLim.includes(':')) ? horaLim.split(':') : [23, 59];
                            if (agora > new Date(d[2], d[1]-1, d[0], h[0], h[1])) exibir = false;
                        }
                        if (exibir) {
                            const a = document.createElement('a');
                            a.href = link || "#";
                            a.target = "_blank";
                            a.className = "btn-base btn-aviso";
                            
                            let html = `<div class="marquee">AVISO: ${msg}</div>`;
                            if (imgPrev && imgPrev.trim() !== "") {
                                html += `<div class="preview-container"><img src="${formatarLinkDrive(imgPrev.trim(), 'thumb')}" class="preview-img"></div>`;
                            }
                            a.innerHTML = html;
                            wrapper.appendChild(a);
                        }
                    }
                });

                // 3. Links com Preview (Coluna C)
                const linksData = await fetchSheetData('links');
                linksContainer.innerHTML = '';
                linksData.slice(1).forEach(row => {
                    const [nome, linkDest, linkPrev] = row;
                    if(nome && linkDest) {
                        const a = document.createElement('a');
                        a.href = linkDest;
                        a.className = "btn-base btn-link";
                        a.target = "_blank";
                        
                        let html = `<span>${nome}</span>`;
                        if (linkPrev && linkPrev.trim() !== "") {
                            html += `<div class="preview-container"><img src="${formatarLinkDrive(linkPrev.trim(), 'thumb')}" class="preview-img"></div>`;
                        }
                        a.innerHTML = html;
                        linksContainer.appendChild(a);
                    }
                });
            } catch (e) { console.error("Erro geral:", e); }
        }

        atualizarEscala();
        carregarPagina();
        setInterval(() => { atualizarEscala(); carregarPagina(); }, 300000);
    </script>
</body>
</html>
